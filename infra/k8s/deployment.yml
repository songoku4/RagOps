apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragops
  namespace: default
  labels:
    app: ragops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ragops
  template:
    metadata:
      labels:
        app: ragops
    spec:
      containers:
        - name: ragops
          image: ragops-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ragops-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10